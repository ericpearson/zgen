name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
            archive_ext: tar.gz
          - os: macos-latest
            name: macos-arm64
            archive_ext: tar.gz
          - os: windows-latest
            name: windows-x64
            archive_ext: zip

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Linux dependencies ──
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libglew-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxss-dev libxkbcommon-dev \
            libwayland-dev libwayland-egl1 wayland-protocols \
            libdecor-0-dev \
            libpulse-dev libasound2-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdbus-1-dev libudev-dev libpipewire-0.3-dev

      - name: Build SDL3 from source (Linux)
        if: runner.os == 'Linux'
        run: |
          SDL3_TAG="release-3.2.8"
          git clone --depth 1 --branch "$SDL3_TAG" https://github.com/libsdl-org/SDL.git /tmp/SDL3
          cmake -S /tmp/SDL3 -B /tmp/SDL3/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DSDL_WAYLAND=ON -DSDL_X11=ON
          cmake --build /tmp/SDL3/build -j4
          sudo cmake --install /tmp/SDL3/build

      # ── macOS dependencies ──
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl3

      # ── Windows dependencies (MSYS2 / MinGW64) ──
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-sdl3
            mingw-w64-x86_64-glew
            zip

      # ── Build ──
      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release -j4

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --config Release -j4

      # ── Test ──
      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest --test-dir build -C Release --output-on-failure --timeout 600

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ctest --test-dir build -C Release --output-on-failure --timeout 600

      # ── Package ──
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp build/genesis staging/zgen
          cp README.md REFERENCES.md LICENSE staging/
          tar czf "zgen-${{ matrix.name }}.${{ matrix.archive_ext }}" -C staging .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir -p staging
          cp build/genesis.exe staging/zgen.exe
          # Bundle MinGW runtime DLLs needed by the exe
          MINGW_BIN="/mingw64/bin"
          for dll in SDL3.dll glew32.dll libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            [ -f "$MINGW_BIN/$dll" ] && cp "$MINGW_BIN/$dll" staging/
          done
          cp README.md REFERENCES.md LICENSE staging/
          cd staging && zip -r "../zgen-${{ matrix.name }}.${{ matrix.archive_ext }}" . && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zgen-${{ matrix.name }}
          path: zgen-${{ matrix.name }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
